<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hotel Booking Form</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Hotel Booking</h2>

    <form id="bookingForm" novalidate>

        <!-- Full Name -->
        <div class="form-group">
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" name="fullname">
            <small class="field-error" id="fullnameError"></small>
        </div>

        <!-- Email -->
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email">
            <small class="field-error" id="emailError"></small>
        </div>

        <!-- Phone -->
        <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone">
            <small class="field-error" id="phoneError"></small>
        </div>

        <!-- Check-in -->
        <div class="form-group">
            <label for="checkin">Check-in Date</label>
            <input type="date" id="checkin" name="checkin">
            <small class="field-error" id="checkinError"></small>
        </div>

        <!-- Check-out -->
        <div class="form-group">
            <label for="checkout">Check-out Date</label>
            <input type="date" id="checkout" name="checkout">
            <small class="field-error" id="checkoutError"></small>
        </div>

        <!-- Room -->
        <div class="form-group">
            <label for="room">Room Type</label>
            <select id="room" name="room">
                <option value="">Select Room Type</option>
                <option value="single">Single</option>
                <option value="double">Double</option>
                <option value="suite">Suite</option>
            </select>
            <small class="field-error" id="roomError"></small>
        </div>

        <!-- Guests -->
        <div class="form-group">
            <label for="guests">Number of Guests</label>
            <input type="number" id="guests" name="guests" min="1" max="10">
            <small class="field-error" id="guestsError"></small>
        </div>

        <!-- Requests -->
        <div class="form-group">
            <label for="requests">Special Requests (Optional)</label>
            <textarea id="requests" name="requests" rows="3"></textarea>
        </div>

        <p class="success" id="successMsg"></p>

        <button type="submit" id="submitBtn">Book Now</button>

    </form>
</div>

<script src="script.js"></script>
</body>
</html>
